name: Build WebTransportAddIn.zip

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            gcc-multilib \
            libc6-dev-i386 \
            unzip \
            zip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            i686-pc-windows-gnu
            x86_64-pc-windows-gnu
            i686-unknown-linux-gnu
            x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Build package
        run: cargo make pack

      - name: Verify Darwin artifact in ZIP
        run: |
          version="$(cargo pkgid | sed -E 's/^.*@([^ ]+)$/\1/')"
          zip_path="out/WebTransportAddIn-${version}.zip"
          test -f "$zip_path"
          unzip -l "$zip_path" | tee zip-contents.txt
          grep -F "WebTransportAddIn_x64-${version}.dylib" zip-contents.txt
          unzip -p "$zip_path" Manifest.xml | grep -F '<component os="MacOS"'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebTransportAddIn
          path: |
            out/WebTransportAddIn-*.zip
            out/WebTransportAddIn.zip
